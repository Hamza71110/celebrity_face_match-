apiVersion: v1
kind: Service
metadata:
  name: celebrity-face-api
  labels:
    app: celebrity-face-api
spec:
  type: NodePort
  selector:
    app: celebrity-face-api
  ports:
    - protocol: TCP
      port: 8000          # service port inside the cluster
      targetPort: 8000    # container port
      nodePort: 30080     # externally reachable node port (30000-32767)
